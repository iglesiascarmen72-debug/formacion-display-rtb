<!DOCTYPE html>

        Esta página está pensada para explicar formatos como pre-roll, mid-roll, outstream e in-banner video.

      <div class="ad-slot ad-outstream" data-format="Outstream Video">
        <span>Ad Slot: Outstream Video</span>
      </div>
